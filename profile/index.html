<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>Профиль пользователя</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <h1>Профиль пользователя</h1>
    <form id="profileForm">
        <label>Имя:<input type="text" id="name" required /></label><br/>
        <label>Возраст:<input type="number" id="age" required /></label><br/>
        <label>Город:<input type="text" id="city" required /></label><br/>
        <label>Хобби:<input type="text" id="hobby" required /></label><br/>
        <button type="submit">Сохранить</button>
        <button type="button" id="clearBtn">Очистить данные</button>
    </form>
    <div id="result"></div>
    <script src="main.js"></script>
</body>
</html>
